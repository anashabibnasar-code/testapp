<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap single">
    <section class="panel">
      <h1 id="testTitle">Student Test</h1>
      <p id="timerBox" class="timer hidden">Time Left: --:--</p>

      <div id="startBlock">
        <label>Your Name</label>
        <input id="studentName" type="text" placeholder="Enter your name" />
        <button id="startBtn" type="button">Start Test</button>
      </div>

      <form id="testForm" class="hidden"></form>
      <button id="submitBtn" class="hidden" type="button">Submit Test</button>

      <section id="resultBox" class="hidden"></section>
      <p id="testMessage" class="message"></p>
    </section>
  </main>

  <script src="/test.js"></script>
</body>
</html>
